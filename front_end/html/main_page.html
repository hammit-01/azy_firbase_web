<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/main_page.css">
    <title>재고 시스템</title>
</head>

<body>
    <h1>📦 재고 리스트</h1>
    <div class="controls">

        <input type="text" id="searchInput" placeholder="검색어 입력">

        <select id="searchField">
            <option value="상품명">상품명</option>
            <option value="브랜드">브랜드</option>
            <option value="등급">등급</option>
            <option value="ESTNO">ESTNO</option>
            <option value="BL번호">BL번호</option>
            <option value="창고">창고</option>
        </select>

        <select id="sortField">
            <option value="재고수량">재고수량</option>
            <option value="유통기한">유통기한</option>
            <option value="중량">중량</option>
            <option value="평균중량">평균중량</option>
        </select>

        <select id="sortOrder">
            <option value="asc">오름차순</option>
            <option value="desc">내림차순</option>
        </select>

    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>상품명</th>
                    <th>브랜드</th>
                    <th>등급</th>
                    <th>ESTNO</th>
                    <th>재고수량</th>
                    <th>BL번호</th>
                    <th>창고</th>
                    <th>유통기한</th>
                    <th>중량</th>
                    <th>평균중량</th>
                </tr>
            </thead>

            <tbody id="list"></tbody>
        </table>
    </div>

    <script type="module" src="app.js?v=2"></script>


    <!-- 반드시 여기 (맨 아래) -->
    <script type="module" src="app.js"></script>
</body>

</html>
