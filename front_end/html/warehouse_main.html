<!DOCTYPE html>
<html lang="ko">
<!-- firebase web service upload = /css/...
 pytjon service upload = /css/... -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="./css/warehouse_main.css">
    <title>재고 시스템</title>
</head>

<body>
    <div class="container">

        <!-- ── 고정 헤더 (툴바 + 패널) ── -->
        <div class="sticky-header">
        <div class="toolbar">
            <div class="toolbar-left">
                <img src="./css/logo.png" class="logo">
                <div class="toolbar-title">
                    <h1>재고 리스트</h1>
                    <div class="table_size"></div>
                </div>
            </div>

            <div class="toolbar-right">
                <!-- 필터 -->
                <select class="show-warehouse filter-sel">
                    <option value="">창고</option>
                    <option value="곤지암">곤지암</option>
                    <option value="곤CS">곤CS</option>
                    <option value="곤SWC">곤SWC</option>
                    <option value="곤대재">곤대재</option>
                    <option value="곤대청">곤대청</option>
                    <option value="곤삼진2">곤삼진2</option>
                    <option value="곤에이스처인">곤에이스처인</option>
                </select>

                <select class="show-brand filter-sel">
                    <option value="">브랜드</option>
                    <option value="AFG">AFG</option>
                    <option value="AGROSUPER">AGROSUPER</option>
                    <option value="AMH">AMH</option>
                    <option value="EXCEL">EXCEL</option>
                    <option value="GCM">GCM</option>
                    <option value="GREENHAM">GREENHAM</option>
                    <option value="IBP">IBP</option>
                    <option value="KILCOY">KILCOY</option>
                    <option value="LITERA">LITERA</option>
                    <option value="LOCKS">LOCKS</option>
                    <option value="NB">NB</option>
                    <option value="OLYMEL">OLYMEL</option>
                    <option value="PATEL">PATEL</option>
                    <option value="PERDIGAO">PERDIGAO</option>
                    <option value="PPCS">PPCS</option>
                    <option value="SADIA">SADIA</option>
                    <option value="SEARA">SEARA</option>
                    <option value="SHOWCASE">SHOWCASE</option>
                    <option value="SMITHFIELD">SMITHFIELD</option>
                    <option value="SWIFT">SWIFT</option>
                    <option value="TEYS">TEYS</option>
                    <option value="TONNIES FLEISCH">TONNIES FLEISCH</option>
                </select>

                <select class="show-state filter-sel">
                    <option value="">상태</option>
                    <option value="holding">홀딩</option>
                    <option value="freeze">동결</option>
                    <option value="stopped">사용불가</option>
                    <option value="moving">이고</option>
                </select>

                <input id="searchInput" class="search-input" placeholder="검색">

                <div class="tb-sep"></div>

                <!-- CRUD 버튼 -->
                <button class="insert-btn">추가</button>
                <button class="update-btn">수정</button>
                <button class="holding-btn">홀딩</button>

                <div class="tb-sep"></div>

                <!-- 유틸 버튼 -->
                <button class="rollback-btn">되돌리기</button>
                <button class="clear-btn" data-action="clear-selection">전체 취소</button>
                <button class="all-delete-btn">전체 삭제</button>
            </div>
        </div>

        <!-- ── 선택 패널 ── -->
        <div class="top_bar">
            <div class="right-panel">
                <div id="sideBox"></div>
            </div>
        </div>
        </div><!-- /.sticky-header -->

        <!-- ── 테이블 ── -->
        <div class="table-container">
        <div class="left-panel">
            <div id="mobile-list" class="mobile-list"></div>
            <div class="table-wrap">
                <table>
                    <colgroup>
                        <col style="width:3%">  <!--선택-->
                        <col style="width:10%"> <!--상품명-->
                        <col style="width:9%">  <!--브랜드-->
                        <col style="width:6%">  <!--등급-->
                        <col style="width:7%">  <!--ESTNO-->
                        <col style="width:6%">  <!--재고-->
                        <col style="width:14%"> <!--BL번호-->
                        <col style="width:8%">  <!--창고-->
                        <col style="width:9%">  <!--유통기한-->
                        <col style="width:5%">  <!--평균-->
                        <col style="width:8%">  <!--출고일-->
                        <col style="width:9%">  <!--홀딩-->
                        <col style="width:6%">  <!--메모-->
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="select-all">선택</th>
                            <th data-key="상품명" class="sortable">상품명</th>
                            <th data-key="브랜드" class="sortable">브랜드</th>
                            <th data-key="등급" class="sortable">등급</th>
                            <th data-key="ESTNO" class="sortable">ESTNO</th>
                            <th data-key="재고" class="sortable">재고</th>
                            <th data-key="BL">BL</th>
                            <th data-key="창고" class="sortable">창고</th>
                            <th data-key="유통기한" class="sortable">유통기한</th>
                            <th data-key="평균">평균</th>
                            <th data-key="출고일">출고일</th>
                            <th data-key="홀딩">홀딩</th>
                            <th data-key="메모">메모</th>
                        </tr>
                    </thead>
                    <tbody id="list"></tbody>
                </table>
            </div>
        </div>
        </div><!-- /.table-container -->
    </div>

    <script type="module" src="./warehouse_main.js"></script>
</body>

</html>
